name: Continuous Build Loop (every hour)

on:
  schedule:
    - cron: '0 * * * *'   # Every hour, 24/7
  workflow_dispatch:        # Manual trigger for testing

# Only one loop runs at a time — cancel if already running
concurrency:
  group: iteration-loop
  cancel-in-progress: false  # Don't cancel — let it finish

jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 55       # Never exceed 1 hour (next run starts at 60min)
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0      # Full history so agents can see git log

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GitHub CLI auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Configure git
        run: |
          git config --global user.email "agents@gofal.wales"
          git config --global user.name "gofal agents"

      - name: Run iteration loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NATHAN_EMAIL: ${{ secrets.NATHAN_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npx ts-node scripts/standups/iteration-loop.ts

      - name: Push any remaining changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "chore: iteration cleanup"
          git push || true   # Don't fail if nothing to push

      - name: Update STATUS.md badge
        if: always()
        run: |
          echo "Last iteration: $(date -u)" >> STATUS.md
          git add STATUS.md
          git diff --staged --quiet || git commit -m "chore: update status"
          git push || true
